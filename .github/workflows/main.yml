name: SGIN-HFT CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Test Suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          chmod +x run_tests.sh
          ./run_tests.sh
- name: Install dependencies and package
  run: |
    pip install -r requirements.txt  # If you have one
    pip install -e .                # Installs local modules in editable mode

- name: Run Test Suite
  run: |
    chmod +x run_tests.sh
    ./run_tests.sh
    

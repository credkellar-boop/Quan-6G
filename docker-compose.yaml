version: '3.8'
services:
  sgin_orchestrator:
    build: .
    command: python3 sgin_main_orchestrator.py
    network_mode: host
    ipc: host  # Required for shared memory ring buffers
    shm_size: '1gb'

  hft_engine:
    build: .
    command: python3 hft_integrated_engine.py
    depends_on:
      - sgin_orchestrator
    ipc: host
    shm_size: '1gb'

  api_gateway:
    build: .
    command: python3 sgin_api_gateway.py
    ports:
      - "8080:8080"
